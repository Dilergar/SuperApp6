version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: superapp6-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superapp6
      POSTGRES_USER: superapp
      POSTGRES_PASSWORD: superapp
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U superapp -d superapp6']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching, sessions, pub/sub
  redis:
    image: redis:7-alpine
    container_name: superapp6-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-совместимое объектное хранилище (files engine, FILES_DRIVER=s3).
  # Опциональный профиль: обычный `docker compose up -d` его НЕ стартует.
  # Запуск: docker compose --profile s3 up -d
  # Внутри контейнера файлы пишутся под UID 1000 — volume должен быть ему доступен.
  seaweedfs:
    image: chrislusf/seaweedfs:4.37
    container_name: superapp6-s3
    profiles: ['s3']
    restart: unless-stopped
    command: 'server -s3 -s3.port=8333 -dir=/data'
    ports:
      - '8333:8333'
    volumes:
      - seaweed_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8333 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # Антивирус для файлового движка (FilesScanHook). Опциональный профиль:
  # запуск: docker compose --profile scan up -d
  # Первый старт долгий — clamd подтягивает базу сигнатур (минуты, ~1-2 ГБ RAM).
  # Затем задать в apps/api/.env: CLAMAV_HOST=localhost (CLAMAV_PORT=3310).
  clamav:
    image: clamav/clamav:1.4
    container_name: superapp6-clamav
    profiles: ['scan']
    restart: unless-stopped
    ports:
      - '3310:3310'
    environment:
      # поднимаем лимит потока до потолка размера файла движка (200 МБ)
      CLAMD_CONF_StreamMaxLength: '200M'
      CLAMD_CONF_MaxFileSize: '200M'
      CLAMD_CONF_MaxScanSize: '200M'
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ['CMD-SHELL', 'echo PING | nc -w 5 localhost 3310 | grep -q PONG']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # STT-сервер голосового движка (core/voice): OpenAI-совместимый Whisper
  # (faster-whisper) + диаризация спикеров. Опциональный профиль:
  # запуск: docker compose --profile voice up -d
  # Первый старт долгий — качается модель (start_period 300s). CPU-образ;
  # для GPU — тег hwdsl2/whisper-server:cuda + NVIDIA Container Toolkit.
  # Модель: WHISPER_MODEL=small (дев-дефолт; для качества ru/kk — large-v3-turbo).
  # Затем задать в apps/api/.env:
  #   VOICE_STT_URL=http://localhost:9000
  #   VOICE_STT_API_KEY=superapp6-voice-dev   (= WHISPER_API_KEY ниже; смени в проде!)
  whisper:
    image: hwdsl2/whisper-server
    container_name: superapp6-whisper
    profiles: ['voice']
    restart: unless-stopped
    ports:
      - '9000:9000'
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DIARIZATION: 'true'
      WHISPER_COMPUTE_TYPE: int8
      WHISPER_API_KEY: ${WHISPER_API_KEY:-superapp6-voice-dev}
    volumes:
      - whisper_data:/var/lib/whisper
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs -H "Authorization: Bearer $$WHISPER_API_KEY" http://localhost:9000/v1/models || wget -q -O /dev/null --header "Authorization: Bearer $$WHISPER_API_KEY" http://localhost:9000/v1/models || exit 1']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # SFU-сервер движка звонков (core/calls): LiveKit — WebRTC-комнаты уровня Google Meet
  # (simulcast/adaptive streams/Opus RED — техники устойчивости Meet из коробки).
  # Опциональный профиль: docker compose --profile calls up -d
  # Затем в apps/api/.env:
  #   LIVEKIT_URL=http://localhost:7880
  #   LIVEKIT_API_KEY=devkey
  #   LIVEKIT_API_SECRET=superapp6-calls-dev-secret-0123456789ab   (= LIVEKIT_DEV_SECRET ниже, ≥32 символов — иначе сервер не стартует; смени в проде!)
  #   LIVEKIT_EGRESS_DIR=./storage/egress   (запись звонков; = bind-mount egress ниже)
  # Второе устройство в LAN: LIVEKIT_NODE_IP=<IPv4 хоста из ipconfig> + firewall на 7880-7882.
  livekit:
    image: livekit/livekit-server:v1.13
    container_name: superapp6-livekit
    profiles: ['calls']
    restart: unless-stopped
    # --node-ip — ICE-кандидат, который сервер рекламирует браузеру (Docker-NAT);
    # 127.0.0.1 достаточно для одного ПК (dev), для телефона в Wi-Fi — LAN-IP хоста.
    command: --node-ip ${LIVEKIT_NODE_IP:-127.0.0.1}
    ports:
      - '7880:7880' # signaling WebSocket + HTTP API
      - '7881:7881' # WebRTC-over-TCP fallback
      - '7882:7882/udp' # ЕДИНЫЙ muxed UDP-порт медиа (диапазон портов на Docker-Windows не работает)
    environment:
      # redis ОБЯЗАТЕЛЕН для связки с egress (psrpc-координация): без блока redis
      # StartEgress отвечает «egress not connected», хотя сам контейнер жив
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses: ["0.0.0.0"]
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: false
          # Устойчивость к слабой сети: при заторе SFU ПАУЗИТ видео-треки, сохраняя
          # аудио (allow_pause в коде сервера по умолчанию false!) — механизм
          # «звук не виснет» Google Meet: видео замирает первым, разговор продолжается
          congestion_control:
            enabled: true
            allow_pause: true
        redis:
          address: redis:6379
        keys:
          devkey: ${LIVEKIT_DEV_SECRET:-superapp6-calls-dev-secret-0123456789ab}
        webhook:
          api_key: devkey
          urls:
            - http://host.docker.internal:3001/api/calls/livekit/webhook
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway' # Docker Desktop имеет из коробки; строка — для Linux-хостов
    # Dev-инструмент: имитация плохой сети (tc/netem) для проверки устойчивости звонков.
    # tc в Alpine-образе нет — поставить один раз в ЖИВОЙ контейнер (не переживает пересоздание):
    #   docker exec superapp6-livekit apk add --no-cache iproute2
    # Включить деградацию (потери+лаг server→browser; бьёт ВЕСЬ трафик контейнера, вкл. вебхуки — тесты короткие):
    #   docker exec superapp6-livekit tc qdisc add dev eth0 root netem delay 200ms 50ms loss 15%
    # Выключить: docker exec superapp6-livekit tc qdisc del dev eth0 root
    cap_add:
      - NET_ADMIN

  # Запись звонков (подсистема движка core/calls): LiveKit Egress пишет audio-only
  # RoomComposite → OGG в /out (bind-mount ./apps/api/storage/egress — его читает
  # хост-API и инжестит в core/files). Тот же профиль calls: без egress звонки
  # работают, но кнопка ⏺ скрыта (LIVEKIT_EGRESS_DIR в .env не задан).
  # egress_*-вебхуки шлёт сам livekit-server (egress репортит через redis).
  livekit-egress:
    image: livekit/egress:v1.9
    container_name: superapp6-egress
    profiles: ['calls']
    restart: unless-stopped
    # Chrome внутри образа использует /dev/shm — дефолтных 64МБ мало
    shm_size: '1gb'
    environment:
      EGRESS_CONFIG_BODY: |
        log_level: info
        api_key: devkey
        api_secret: ${LIVEKIT_DEV_SECRET:-superapp6-calls-dev-secret-0123456789ab}
        ws_url: ws://livekit:7880
        redis:
          address: redis:6379
    volumes:
      - ./apps/api/storage/egress:/out
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  seaweed_data:
  clamav_data:
  whisper_data:
