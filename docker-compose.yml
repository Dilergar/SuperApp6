version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: superapp6-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superapp6
      POSTGRES_USER: superapp
      POSTGRES_PASSWORD: superapp
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U superapp -d superapp6']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching, sessions, pub/sub
  redis:
    image: redis:7-alpine
    container_name: superapp6-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
