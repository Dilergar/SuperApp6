version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: superapp6-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superapp6
      POSTGRES_USER: superapp
      POSTGRES_PASSWORD: superapp
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U superapp -d superapp6']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching, sessions, pub/sub
  redis:
    image: redis:7-alpine
    container_name: superapp6-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-совместимое объектное хранилище (files engine, FILES_DRIVER=s3).
  # Опциональный профиль: обычный `docker compose up -d` его НЕ стартует.
  # Запуск: docker compose --profile s3 up -d
  # Внутри контейнера файлы пишутся под UID 1000 — volume должен быть ему доступен.
  seaweedfs:
    image: chrislusf/seaweedfs:4.37
    container_name: superapp6-s3
    profiles: ['s3']
    restart: unless-stopped
    command: 'server -s3 -s3.port=8333 -dir=/data'
    ports:
      - '8333:8333'
    volumes:
      - seaweed_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8333 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # Антивирус для файлового движка (FilesScanHook). Опциональный профиль:
  # запуск: docker compose --profile scan up -d
  # Первый старт долгий — clamd подтягивает базу сигнатур (минуты, ~1-2 ГБ RAM).
  # Затем задать в apps/api/.env: CLAMAV_HOST=localhost (CLAMAV_PORT=3310).
  clamav:
    image: clamav/clamav:1.4
    container_name: superapp6-clamav
    profiles: ['scan']
    restart: unless-stopped
    ports:
      - '3310:3310'
    environment:
      # поднимаем лимит потока до потолка размера файла движка (200 МБ)
      CLAMD_CONF_StreamMaxLength: '200M'
      CLAMD_CONF_MaxFileSize: '200M'
      CLAMD_CONF_MaxScanSize: '200M'
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ['CMD-SHELL', 'echo PING | nc -w 5 localhost 3310 | grep -q PONG']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # STT-сервер голосового движка (core/voice): OpenAI-совместимый Whisper
  # (faster-whisper) + диаризация спикеров. Опциональный профиль:
  # запуск: docker compose --profile voice up -d
  # Первый старт долгий — качается модель (start_period 300s). CPU-образ;
  # для GPU — тег hwdsl2/whisper-server:cuda + NVIDIA Container Toolkit.
  # Модель: WHISPER_MODEL=small (дев-дефолт; для качества ru/kk — large-v3-turbo).
  # Затем задать в apps/api/.env:
  #   VOICE_STT_URL=http://localhost:9000
  #   VOICE_STT_API_KEY=superapp6-voice-dev   (= WHISPER_API_KEY ниже; смени в проде!)
  whisper:
    image: hwdsl2/whisper-server
    container_name: superapp6-whisper
    profiles: ['voice']
    restart: unless-stopped
    ports:
      - '9000:9000'
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DIARIZATION: 'true'
      WHISPER_COMPUTE_TYPE: int8
      WHISPER_API_KEY: ${WHISPER_API_KEY:-superapp6-voice-dev}
    volumes:
      - whisper_data:/var/lib/whisper
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs -H "Authorization: Bearer $$WHISPER_API_KEY" http://localhost:9000/v1/models || wget -q -O /dev/null --header "Authorization: Bearer $$WHISPER_API_KEY" http://localhost:9000/v1/models || exit 1']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

volumes:
  postgres_data:
  redis_data:
  seaweed_data:
  clamav_data:
  whisper_data:
